spring.application.name=ecom-order
spring.main.web-application-type=reactive

db.url=ecom-order-mysql-lb
db.port=33063

spring.r2dbc.url=r2dbc:mysql://${db.url}:${db.port}/order
spring.r2dbc.username=ENC(1GqOAfgkmIiUdnu7uNFXwyF7OmJdyIATct2fMrMIg+5V4LV0CPiAlIHHpoNo75eW)
spring.r2dbc.password=ENC(/U3bWRugjCCs5O1r8808htZ4x1iz1Dr3kkxIZP7TU6lbuQeRYG3Z3MvzCo/uKykxKqNfHVljxFRvf4bVzewaww==)

spring.flyway.enabled=true
spring.flyway.url=jdbc:mysql://${db.url}:${db.port}/order
spring.flyway.user=${spring.r2dbc.username}
spring.flyway.password=${spring.r2dbc.password}
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

springdoc.swagger-ui.path=/apispec.html
springdoc.swagger-ui.url=/apispec.yaml
springdoc.api-docs.enabled=true

spring.messages.encoding=UTF-8

jasypt.encryptor.password=${ENCRYPTION_KEY}
jasypt.encryptor.algorithm=PBEWithHMACSHA512AndAES_256
jasypt.encryptor.iv-generator-classname=org.jasypt.iv.RandomIvGenerator
jasypt.encryptor.key-obtention-iterations=1000

token.jwt.secret=ENC(n+gYRXCGBWfhIxHv050W0aVZ5GqJAwdVipmIwWr/7rhpnsuHPcwCK3zADpk8O/r5okNsC/6pnOXsP2//KHcjMg==)

management.endpoints.web.exposure.include=prometheus,threaddump
management.endpoint.prometheus.enabled=true
management.server.port=8081

# WebClient 설정 값
app.member-api.url=http://ecom-member-api:18080
app.member-api.pool-size=100
app.member-api.pool-acquire-time=3
app.member-api.pool-idle-time=30
app.member-api.pool-max-time=60
app.member-api.pool-evict-time=30
app.member-api.time-out=3

app.product-api.url=http://ecom-product-api:18084
app.product-api.pool-size=100
app.product-api.pool-acquire-time=3
app.product-api.pool-idle-time=30
app.product-api.pool-max-time=60
app.product-api.pool-evict-time=30
app.product-api.time-out=3

app.stock-api.url=http://ecom-stock-api:18086
app.stock-api.pool-size=100
app.stock-api.pool-acquire-time=3
app.stock-api.pool-idle-time=30
app.stock-api.pool-max-time=60
app.stock-api.pool-evict-time=30
app.stock-api.time-out=3

logging.level.site.ng_archive.ecom_common.logging=trace
logging.level.org.zalando.logbook=trace
logbook.filter.enabled=false
logbook.format.style=json
logbook.write.max-body-size=10240
logbook.obfuscate.json-body-fields[0]=password
logbook.predicate.exclude[0].path=/actuator/**
logbook.predicate.exclude[1].path=/swagger-ui/**
logbook.predicate.exclude[2].path=/apispec*
logbook.predicate.exclude[3].path=/v3/api-docs/*
logbook.predicate.exclude[4].path=/favicon.ico
logbook.obfuscate.headers[0]=Authorization

